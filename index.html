<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurassic RPG Builder PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #526a40; color: #ffffff; display: flex; padding: 20px; gap: 20px; height: 100vh; margin: 0; box-sizing: border-box; overflow: hidden; }
        body::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle at 20% 40%, rgba(255, 255, 255, 0.05), transparent 40%); z-index: -1; }
        .editor-panel, .preview-panel { background-color: rgba(20, 30, 15, 0.85); backdrop-filter: blur(12px); padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); z-index: 1; }
        .editor-panel { width: 45%; display: flex; flex-direction: column; overflow-y: auto; }
        .preview-panel { width: 55%; display: flex; flex-direction: column; position: relative; }
        .editor-panel::-webkit-scrollbar { width: 8px; }
        .editor-panel::-webkit-scrollbar-thumb { background: #89a873; border-radius: 4px; }
        h1 { color: #facc15; font-weight: 800; font-size: 24px; margin: 0 0 5px 0; text-align: center; text-transform: uppercase; letter-spacing: 2px;}
        .subtitle { text-align: center; color: #b1c7a3; font-size: 12px; margin-bottom: 20px; letter-spacing: 0.5px;}
        h3 { color: #facc15; font-size: 14px; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px; margin-top: 20px; text-transform: uppercase;}
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 11px; color: #b1c7a3; text-transform: uppercase;}
        input[type="text"], select, textarea, input[type="number"] { width: 100%; padding: 10px 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background-color: rgba(0,0,0,0.4); color: #fff; box-sizing: border-box; font-family: 'Poppins', sans-serif; font-size: 14px; transition: 0.3s; }
        input[type="text"]:focus, select:focus, textarea:focus, input[type="number"]:focus { border-color: #facc15; outline: none; }
        textarea { resize: vertical; min-height: 80px; white-space: pre; }
        .flex-row { display: flex; gap: 15px; align-items: flex-start; margin-bottom: 10px; flex-wrap: wrap; }
        .flex-col { flex: 1; min-width: 120px; }
        .checkbox-label { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 13px; color: #fff; background: rgba(0,0,0,0.3); padding: 10px 15px; border-radius: 10px;}
        .checkbox-label input { width: 18px; height: 18px; cursor: pointer; accent-color: #facc15;}
        #previewFrame { width: 100%; flex: 1; border: 2px solid rgba(255,255,255,0.2); border-radius: 15px; background-color: #000; outline: none; }
        button.dl-btn { background: linear-gradient(135deg, #f59e0b, #facc15); color: #000; padding: 18px; border: none; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 800; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3); margin-top: 20px; width: 100%;}
        button.dl-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(245, 158, 11, 0.4); }
    </style>
</head>
<body>

🦕
🦎
🐢
🐉
🦅</textarea></div>

У кого из них 3 рога?</textarea></div>

Яйца</textarea></div>
        </div>

    <script>

        const dicts = {

            RU: { t: "ЮРСКИЕ ПРИКЛЮЧЕНИЯ", s: "Найди артефакты. Избегай хищников!", st: "ИГРАТЬ", w: "ВЫ ПОБЕДИЛИ!", l: "ИГРА ОКОНЧЕНА", r: "ИГРАТЬ СНОВА", ri: "ВЕРНО!", wr: "-1 HP", ta: "Введите ответ...", su: "ОТВЕТИТЬ", pa: "ПАУЗА" },
            ES: { t: "AVENTURA JURÁSICA", s: "Encuentra artefactos. Evita depredadores!", st: "JUGAR", w: "¡SOBREVIVISTE!", l: "FIN DEL JUEGO", r: "REINTENTAR", ri: "¡CORRECTO!", wr: "-1 HP", ta: "Respuesta...", su: "ENVIAR", pa: "PAUSA" },
            FR: { t: "AVENTURE JURASSIQUE", s: "Trouvez tous les artefacts.", st: "JOUER", w: "VOUS AVEZ SURVÉCU!", l: "FIN DE PARTIE", r: "RÉESSAYER", ri: "CORRECT!", wr: "-1 HP", ta: "Tapez votre réponse...", su: "SOUMETTRE", pa: "PAUSE" },
            DE: { t: "JURA-ABENTEUER", s: "Finde alle Artefakte.", st: "STARTEN", w: "ÜBERLEBT!", l: "SPIEL VORBEI", r: "NOCHMAL", ri: "RICHTIG!", wr: "-1 HP", ta: "Antwort eingeben...", su: "ABSENDEN", pa: "PAUSE" },
            IT: { t: "AVVENTURA GIURASSICA", s: "Trova gli artefatti.", st: "GIOCA", w: "SEI SOPRAVVISSUTO!", l: "FINE GIOCO", r: "RIPROVA", ri: "CORRETTO!", wr: "-1 HP", ta: "Scrivi la risposta...", su: "INVIA", pa: "PAUSA" },
            PT: { t: "AVENTURA JURÁSSICA", s: "Encontre os artefatos.", st: "JOGAR", w: "VOCÊ SOBREVIVEU!", l: "FIM DE JOGO", r: "TENTAR NOVAMENTE", ri: "CORRETO!", wr: "-1 HP", ta: "Digite a resposta...", su: "ENVIAR", pa: "PAUSA" },
            TR: { t: "JURA MACERASI", s: "Eserleri bul.", st: "BAŞLA", w: "HAYATTA KALDIN!", l: "OYUN BİTTİ", r: "TEKRAR DENE", ri: "DOĞRU!", wr: "-1 HP", ta: "Cevabı yazın...", su: "GÖNDER", pa: "DURAKLATILDI" }
        };

        function getInputs() {
            return {
                l: document.getElementById('uiLang').value, mL: parseInt(document.getElementById('maxLives').value) || 3, eC: parseInt(document.getElementById('enemyCount').value) || 15,
                uS: document.getElementById('useSound').checked, bU: document.getElementById('bgmUrl').value.trim(), bT: document.getElementById('bgType').value, bI: document.getElementById('bgImg').value.trim(),
                o1: document.getElementById('obs1Img').value.trim(), o2: document.getElementById('obs2Img').value.trim(), eI: document.getElementById('enemyImg').value.trim(),
                aI: document.getElementById('artImg').value.trim(), lI: document.getElementById('lifeImg').value.trim(), apI: document.getElementById('appleImg').value.trim(),
                hr: document.getElementById('heroesImg').value.split('\n').map(x=>x.trim()).filter(x=>x!==''), qR: document.getElementById('qData').value, aR: document.getElementById('aData').value,
                qTR: document.getElementById('qDataText').value, aTR: document.getElementById('aDataText').value
            };
        }

        function buildQ(qc, ac, qt, at) {
            let d = [];
            let qA = qc.split('\n').map(x=>x.trim()).filter(x=>x!==''); let aA = ac.split('\n').map(x=>x.trim()).filter(x=>x!=='');
            for(let i=0; i<Math.min(qA.length, aA.length); i++) {
                let p = aA[i].split('|').map(x=>x.trim()); if(p.length < 1) continue;
                d.push({ t: 'c', q: qA[i], o: p.map((tx, idx) => ({ t: tx, c: idx === 0 })) });
            }
            let qTA = qt.split('\n').map(x=>x.trim()).filter(x=>x!==''); let aTA = at.split('\n').map(x=>x.trim()).filter(x=>x!=='');
            for(let i=0; i<Math.min(qTA.length, aTA.length); i++) d.push({ t: 't', q: qTA[i], a: aTA[i] });
            return d.length ? d : [{ t: 'c', q: "No questions!", o: [{t:"Ok", c:true}] }];
        }

        let currentHTML = "";

        function generateCode() {
            const cf = getInputs();
            const lang = dicts[cf.l] || dicts['EN'];
            const qJ = JSON.stringify(buildQ(cf.qR, cf.aR, cf.qTR, cf.aTR));
            
            const bgs = {
                grass: "background:#3b5e2b;background-image:radial-gradient(#2d4c1e 15%,transparent 16%),radial-gradient(#2d4c1e 15%,transparent 16%);background-size:60px 60px;background-position:0 0,30px 30px;",
                sand: "background:#e4c88a;background-image:radial-gradient(#d1b16a 15%,transparent 16%),radial-gradient(#d1b16a 15%,transparent 16%);background-size:60px 60px;background-position:0 0,30px 30px;",
                dirt: "background:#5c4033;background-image:radial-gradient(#422e25 15%,transparent 16%),radial-gradient(#422e25 15%,transparent 16%);background-size:60px 60px;background-position:0 0,30px 30px;",
                lava: "background:#b22222;background-image:radial-gradient(#ff4500 20%,transparent 20%),radial-gradient(#8b0000 20%,transparent 20%);background-size:60px 60px;background-position:0 0,30px 30px;"
            };
            let bgCSS = (cf.bT === 'custom' && cf.bI) ? `background:#111 url('${cf.bI.replace(/['"]/g,'')}');background-size:200px;` : bgs[cf.bT];

            const gameScript = `
const $=id=>document.getElementById(id),$$=s=>document.querySelectorAll(s);
window.onload=()=>{window.focus();}; document.body.onclick=()=>{window.focus();};

function rO(v){return (v.startsWith('http')||v.startsWith('data:'))?'<img src="'+v+'" style="width:100%;height:100%;object-fit:contain;pointer-events:none;">':v;}
const qD=${qJ},hr=${JSON.stringify(cf.hr)};
let gSt=0; // 0:Start, 1:Play, 2:Quiz, 3:End
let pX=1250,pY=1250,sp=4.5,cL=${cf.mL},aC=0,tA=qD.length,iIn=0,isP=0;
let ks={u:0,d:0,l:0,r:0},en=[],ar=[],ob=[],hl=[],cAi=-1,aQt=null,qFi=0,hFi=0;
let vp=$('vp'),w=$('w'),pO=$('p'),sEn=${cf.uS},aCx,bgM=new Audio('${cf.bU}');bgM.loop=1;bgM.volume=0.2;

window.tS=function(){sEn=!sEn;$('s-b').innerText=sEn?'🔊':'🔇';if(sEn){iA();if(!isP)bgM.play().catch(()=>{});}else bgM.pause();};
window.tP=function(){
    if(gSt!==1)return;
    isP=!isP;
    $('p-b').innerText=isP?'▶️':'⏸️';
    $('pa-m').style.display=isP?'flex':'none';
    if(isP){
        ks={u:0,d:0,l:0,r:0}; // stop movement on pause
        if(sEn)bgM.pause();
    }else{
        if(sEn)bgM.play().catch(()=>{});
        requestAnimationFrame(gL);
    }
};

function iA(){if(!aCx)aCx=new(window.AudioContext||window.webkitAudioContext)();if(aCx.state==='suspended')aCx.resume();}
function pS(t){if(!sEn)return;iA();let o=aCx.createOscillator(),g=aCx.createGain(),n=aCx.currentTime;o.connect(g);g.connect(aCx.destination);
if(t==='h'||t==='w'){o.type='sawtooth';o.frequency.setValueAtTime(150,n);o.frequency.exponentialRampToValueAtTime(40,n+0.3);g.gain.setValueAtTime(0.3,n);g.gain.exponentialRampToValueAtTime(0.01,n+0.3);o.start(n);o.stop(n+0.3);}
else if(t==='c'){o.type='sine';o.frequency.setValueAtTime(400,n);o.frequency.exponentialRampToValueAtTime(800,n+0.2);g.gain.setValueAtTime(0.2,n);g.gain.exponentialRampToValueAtTime(0.01,n+0.2);o.start(n);o.stop(n+0.2);}
else if(t==='a'){o.type='square';o.frequency.setValueAtTime(600,n);o.frequency.exponentialRampToValueAtTime(1200,n+0.1);g.gain.setValueAtTime(0.1,n);g.gain.exponentialRampToValueAtTime(0.01,n+0.1);o.start(n);o.stop(n+0.1);}}

const gr=$('d-g'); let sH=hr[0]||'';
function rnH(){gr.innerHTML=''; hr.forEach((u,i)=>{let c=document.createElement('div');c.className='d-c'+(i===hFi?' s':'');c.innerHTML=rO(u);c.onclick=()=>{hFi=i;rnH();sH=u;$('st-b').style.display='inline-block';};gr.appendChild(c);}); sH=hr[hFi]; $('st-b').style.display='inline-block';}
rnH();

window.sG=function(){if(sEn){iA();bgM.play().catch(()=>{});}$('s-b').innerText=sEn?'🔊':'🔇';$('p-b').style.display='flex';$('s-s').style.display='none';pO.style.display='flex';pO.innerHTML=rO(sH);uL();iI();gO(60);sA();sE(${cf.eC});sHL(4);if('ontouchstart' in window||navigator.maxTouchPoints>0)$('dp').style.display='flex';gSt=1;window.focus();requestAnimationFrame(gL);};
function gO(c){for(let i=0;i<c;i++){let e=document.createElement('div');e.className='g-o ob';let iP=Math.random()>0.5;e.innerHTML=rO(iP?'${cf.o1}':'${cf.o2}');let s=iP?80:60;e.style.fontSize=s+'px';e.style.width=s+'px';e.style.height=s+'px';let x,y;do{x=Math.random()*2300+100;y=Math.random()*2300+100;}while(Math.abs(x-1250)<150&&Math.abs(y-1250)<150);e.style.left=x+'px';e.style.top=y+'px';w.appendChild(e);ob.push({x:x,y:y,r:s*0.4});}}
function sA(){qD.forEach((q,i)=>{let e=document.createElement('div');e.className='g-o ar';e.innerHTML=rO('${cf.aI}');let p=gP();e.style.left=p.x+'px';e.style.top=p.y+'px';w.appendChild(e);ar.push({e:e,x:p.x,y:p.y,a:1,q:q,i:i,r:25});});}
// Врагам теперь дается радиус 35 вместо 25, так как их размер увеличен
function sE(c){for(let i=0;i<c;i++){let e=document.createElement('div');e.className='g-o en';e.innerHTML=rO('${cf.eI}');let p=gP();e.style.left=p.x+'px';e.style.top=p.y+'px';w.appendChild(e);en.push({e:e,x:p.x,y:p.y,r:35,dx:(Math.random()>0.5?1:-1)*(Math.random()*1.5+0.5),dy:(Math.random()>0.5?1:-1)*(Math.random()*1.5+0.5)});}}
function sHL(c){for(let i=0;i<c;i++){let e=document.createElement('div');e.className='g-o hl';e.innerHTML=rO('${cf.apI}');let p=gP();e.style.left=p.x+'px';e.style.top=p.y+'px';w.appendChild(e);hl.push({e:e,x:p.x,y:p.y,a:1,r:20});}}
function gP(){let x,y,sf=0;while(!sf){x=Math.random()*2300+100;y=Math.random()*2300+100;sf=1;for(let o of ob)if(Math.sqrt((x-o.x)**2+(y-o.y)**2)<80)sf=0;}return{x,y};}
function uL(){let c=$('l-c');c.innerHTML='';for(let i=0;i<${cf.mL};i++){let d=document.createElement('div');d.className='ht'+(i>=cL?' ls':'');d.innerHTML=rO('${cf.lI}');c.appendChild(d);}if(cL<=0)eG(0);}
function iI(){let c=$('i-c');c.innerHTML='';for(let i=0;i<tA;i++)c.innerHTML+='<div class="i-s" id="sl-'+i+'"></div>';}

// Главный цикл: останавливается, если isP (пауза) = true
function gL(){if(gSt!==1||isP)return;hM();uC();uE();cC();requestAnimationFrame(gL);}

// Хитбокс героя увеличен с 15 до 25
function hM(){let nX=pX,nY=pY;if(ks.u)nY-=sp;if(ks.d)nY+=sp;if(ks.l){nX-=sp;pO.style.transform="translate(-50%,-50%) scaleX(1)";}if(ks.r){nX+=sp;pO.style.transform="translate(-50%,-50%) scaleX(-1)";}if(nX<35)nX=35;if(nX>2465)nX=2465;if(nY<35)nY=35;if(nY>2465)nY=2465;let cX=1,cY=1;for(let o of ob){if(Math.sqrt((nX-o.x)**2+(pY-o.y)**2)<25+o.r)cX=0;if(Math.sqrt((pX-o.x)**2+(nY-o.y)**2)<25+o.r)cY=0;}if(cX)pX=nX;if(cY)pY=nY;pO.style.left=pX+'px';pO.style.top=pY+'px';}
function uC(){let cX=Math.max(0,Math.min(pX-vp.clientWidth/2,2500-vp.clientWidth)),cY=Math.max(0,Math.min(pY-vp.clientHeight/2,2500-vp.clientHeight));w.style.transform='translate('+(-cX)+'px,'+(-cY)+'px)';}
